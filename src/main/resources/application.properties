spring.application.name=springBootProject
server.port=1234

# 允许循环依赖
spring.main.allow-circular-references=true

# H2内存数据库配置
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hikari连接池配置
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.test-query=SELECT 1

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 使用精确匹配的命名策略，不自动转换驼峰命名
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
# 显式指定实体类扫描包
spring.jpa.packages-to-scan=com.springbootproject.Entity

# 关闭H2控制台
spring.h2.console.enabled=false

# 启用SQL日志
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 设置AuthController的日志级别为DEBUG，查看登录参数
logging.level.com.springbootproject.Controller.AuthController=DEBUG

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:}

# WebSocket消息大小限制配置 - 增加到20MB
# Tomcat WebSocket配置
server.tomcat.websocket.maxTextMessageBufferSize=20971520
server.tomcat.websocket.maxBinaryMessageBufferSize=20971520
# Spring WebSocket配置
spring.websocket.max-text-message-size=20971520
spring.websocket.max-binary-message-size=20971520
# HTTP请求大小限制
server.tomcat.max-http-form-post-size=20971520
server.tomcat.max-swallow-size=20971520

# 详细的WebSocket调试日志
logging.level.org.apache.tomcat.websocket=DEBUG
logging.level.org.apache.catalina.websocket=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.springbootproject.Controller.NativeWebSocketController=DEBUG
