name: deploy springboot

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: cache maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: build jar
        run: mvn clean package -DskipTests

      - name: prepare artifact
        run: cp target/springBootProject-0.0.1-SNAPSHOT.jar target/app.jar

      - name: upload to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/app.jar"
          target: "/root/"

      - name: deploy and restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            systemctl stop springboot || true

            PIDS=$(ps -eo pid,args | awk '/[j]ava -jar \/root\/springBootProject-0.0.1-SNAPSHOT\.jar/{print $1}')
            if [ -n "$PIDS" ]; then
              echo "$PIDS" | xargs kill -9 || true
            fi

            sleep 2

            mv -f /root/app.jar /root/springBootProject-0.0.1-SNAPSHOT.jar
            chmod 644 /root/springBootProject-0.0.1-SNAPSHOT.jar

            systemctl daemon-reload
            systemctl start springboot

            sleep 8

            echo "===== springboot status ====="
            systemctl status springboot --no-pager -l || true

            echo "===== java process ====="
            ps -ef | grep java | grep -v grep || true

            echo "===== service binding ====="
            ss -lntp | grep 1234 || true

            echo "===== jar file time ====="
            ls -lh /root/springBootProject-0.0.1-SNAPSHOT.jar || true
